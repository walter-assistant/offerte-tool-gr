<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Offerte Tool — Ground Research BV</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
:root { --primary: #1e3a5f; --primary-light: #2a5a8f; --accent: #e8a838; --bg: #f5f7fa; --card: #fff; --border: #dde3ea; --text: #2c3e50; --muted: #7f8c9b; --success: #27ae60; --danger: #e74c3c; }
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text); font-size: 14px; }
.header { background: var(--primary); color: #fff; padding: 12px 24px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 8px rgba(0,0,0,.2); }
.header h1 { font-size: 18px; font-weight: 600; }
.header .subtitle { font-size: 12px; opacity: .7; }
.header-actions { display: flex; gap: 8px; }
.container { max-width: 1200px; margin: 0 auto; padding: 16px; }
.grid { display: grid; grid-template-columns: 340px 1fr; gap: 16px; }
@media(max-width:900px) { .grid { grid-template-columns: 1fr; } }
.card { background: var(--card); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
.card-header { background: var(--primary); color: #fff; padding: 10px 14px; font-weight: 600; font-size: 13px; display: flex; justify-content: space-between; align-items: center; }
.card-body { padding: 14px; }
label { display: block; font-size: 12px; font-weight: 600; color: var(--muted); margin-bottom: 3px; text-transform: uppercase; letter-spacing: .5px; }
input, select, textarea { width: 100%; padding: 8px 10px; border: 1px solid var(--border); border-radius: 4px; font-size: 13px; font-family: inherit; }
input:focus, select:focus, textarea:focus { outline: none; border-color: var(--primary-light); box-shadow: 0 0 0 2px rgba(30,58,95,.15); }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.form-group { margin-bottom: 10px; }
.btn { padding: 7px 14px; border: none; border-radius: 4px; font-size: 12px; font-weight: 600; cursor: pointer; display: inline-flex; align-items: center; gap: 5px; transition: all .15s; }
.btn-primary { background: var(--primary); color: #fff; }
.btn-primary:hover { background: var(--primary-light); }
.btn-success { background: var(--success); color: #fff; }
.btn-success:hover { background: #219a52; }
.btn-danger { background: var(--danger); color: #fff; }
.btn-danger:hover { background: #c0392b; }
.btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text); }
.btn-outline:hover { background: var(--bg); }
.btn-sm { padding: 4px 8px; font-size: 11px; }
.btn-block { width: 100%; justify-content: center; }

/* Artikelen zoeken */
.search-box { position: relative; margin-bottom: 8px; }
.search-box input { padding-left: 32px; }
.search-box::before { content: '🔍'; position: absolute; left: 10px; top: 50%; transform: translateY(-50%); font-size: 13px; }
.artikel-list { max-height: 400px; overflow-y: auto; border: 1px solid var(--border); border-radius: 4px; }
.artikel-cat { background: var(--bg); padding: 6px 10px; font-weight: 700; font-size: 11px; color: var(--primary); text-transform: uppercase; position: sticky; top: 0; border-bottom: 1px solid var(--border); }
.artikel-item { padding: 6px 10px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #f0f0f0; font-size: 12px; }
.artikel-item:hover { background: #eef3fb; }
.artikel-item .naam { flex: 1; }
.artikel-item .prijs { font-weight: 700; color: var(--primary); min-width: 70px; text-align: right; }
.artikel-item .eenheid { color: var(--muted); font-size: 11px; min-width: 40px; text-align: right; margin-right: 8px; }

/* Offerte tabel */
.offerte-table { width: 100%; border-collapse: collapse; font-size: 12px; }
.offerte-table th { background: var(--primary); color: #fff; padding: 8px 10px; text-align: left; font-size: 11px; text-transform: uppercase; letter-spacing: .5px; }
.offerte-table td { padding: 6px 10px; border-bottom: 1px solid var(--border); vertical-align: middle; }
.offerte-table .num { text-align: right; }
.offerte-table input[type=number] { width: 70px; text-align: right; padding: 4px 6px; }
.offerte-table .del-btn { color: var(--danger); cursor: pointer; font-size: 16px; border: none; background: none; padding: 2px 6px; }
.offerte-table .del-btn:hover { background: #fde; border-radius: 3px; }
.cat-row td { background: var(--bg); font-weight: 700; color: var(--primary); font-size: 11px; text-transform: uppercase; }
.empty-state { text-align: center; padding: 40px; color: var(--muted); }

/* Totalen */
.totalen { margin-top: 16px; }
.totalen-table { width: 300px; margin-left: auto; border-collapse: collapse; font-size: 13px; }
.totalen-table td { padding: 6px 10px; }
.totalen-table .label { text-align: right; color: var(--muted); }
.totalen-table .value { text-align: right; font-weight: 600; min-width: 100px; }
.totalen-table .grand td { font-size: 16px; font-weight: 800; color: var(--primary); border-top: 2px solid var(--primary); }

/* Toast */
.toast { position: fixed; bottom: 20px; right: 20px; background: var(--primary); color: #fff; padding: 10px 20px; border-radius: 6px; font-size: 13px; z-index: 999; transform: translateY(80px); opacity: 0; transition: all .3s; }
.toast.show { transform: translateY(0); opacity: 1; }

/* Toolbar */
.toolbar { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 12px; }
</style>
</head>

<div class="header">
  <div>
    <h1>⛏️ Ground Research BV — Offerte Tool</h1>
    <div class="subtitle">Vrijheidweg 45, 1521 RP Wormerveer</div>
  </div>
  <div class="header-actions">
    <button class="btn btn-success" onclick="exportPDF()">📄 PDF Offerte</button>
    <button class="btn btn-outline" style="color:#fff;border-color:rgba(255,255,255,.3)" onclick="exportJSON()">💾 Export</button>
    <button class="btn btn-outline" style="color:#fff;border-color:rgba(255,255,255,.3)" onclick="importJSON()">📂 Import</button>
  </div>
</div>

<div class="container">
<div class="grid">

<!-- LINKER KOLOM -->
<div>
  <!-- Prijslijst selectie -->
  <div class="card" style="margin-bottom:12px">
    <div class="card-header">Prijslijst</div>
    <div class="card-body">
      <select id="prijslijstSelect" onchange="filterArtikelen()"></select>
    </div>
  </div>

  <!-- Klantgegevens -->
  <div class="card" style="margin-bottom:12px">
    <div class="card-header">Klantgegevens</div>
    <div class="card-body">
      <div class="form-group"><label>Bedrijfsnaam</label><input id="klantBedrijf" oninput="autoSave()"></div>
      <div class="form-group"><label>Contactpersoon</label><input id="klantContact" oninput="autoSave()"></div>
      <div class="form-group"><label>Adres</label><input id="klantAdres" oninput="autoSave()"></div>
      <div class="form-row">
        <div class="form-group"><label>Postcode</label><input id="klantPostcode" oninput="autoSave()"></div>
        <div class="form-group"><label>Plaats</label><input id="klantPlaats" oninput="autoSave()"></div>
      </div>
    </div>
  </div>

  <!-- Project -->
  <div class="card" style="margin-bottom:12px">
    <div class="card-header">Projectgegevens</div>
    <div class="card-body">
      <div class="form-group"><label>Projectnaam</label><input id="projectNaam" oninput="autoSave()"></div>
      <div class="form-group"><label>Kenmerk / Referentie</label><input id="projectKenmerk" oninput="autoSave()"></div>
      <div class="form-group"><label>Locatie</label><input id="projectLocatie" oninput="autoSave()"></div>
      <div class="form-row">
        <div class="form-group"><label>Datum</label><input type="date" id="offerteDatum" oninput="autoSave()"></div>
        <div class="form-group"><label>Offertenummer</label><input id="offerteNummer" oninput="autoSave()"></div>
      </div>
    </div>
  </div>

  <!-- Artikelen zoeken -->
  <div class="card">
    <div class="card-header">Artikelen toevoegen <span id="artikelCount" style="opacity:.6;font-weight:400"></span></div>
    <div class="card-body" style="padding:8px">
      <div class="search-box"><input id="artikelZoek" placeholder="Zoek op omschrijving of code..." oninput="filterArtikelen()"></div>
      <div class="artikel-list" id="artikelList"></div>
    </div>
  </div>
</div>

<!-- RECHTER KOLOM -->
<div>
  <div class="card">
    <div class="card-header">
      Offerte
      <div style="display:flex;gap:6px">
        <button class="btn btn-sm btn-outline" style="color:#fff;border-color:rgba(255,255,255,.3)" onclick="addCustomRow()">+ Eigen regel</button>
        <button class="btn btn-sm btn-outline" style="color:#fff;border-color:rgba(255,255,255,.3)" onclick="duplicateOfferte()">📋 Dupliceer</button>
        <button class="btn btn-sm btn-danger" onclick="nieuweOfferte()">🗑️ Nieuw</button>
      </div>
    </div>
    <div class="card-body" style="padding:0">
      <div id="offerteContent"></div>
    </div>
  </div>

  <!-- Korting & Opmerkingen -->
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:12px">
    <div class="card">
      <div class="card-header">Opmerkingen</div>
      <div class="card-body">
        <textarea id="opmerkingen" rows="3" placeholder="Opmerkingen voor op de offerte..." oninput="autoSave()"></textarea>
      </div>
    </div>
    <div class="card">
      <div class="card-header">Korting & Totalen</div>
      <div class="card-body">
        <div class="form-group">
          <label>Korting %</label>
          <input type="number" id="kortingPct" value="0" min="0" max="100" step="1" oninput="renderOfferte()">
        </div>
        <div id="totalenBox"></div>
      </div>
    </div>
  </div>
</div>

</div>
</div>

<div class="toast" id="toast"></div>
<input type="file" id="importFile" accept=".json" style="display:none" onchange="doImport(event)">

// STATE
// ═══════════════════════════════════════════════
let offerte = { regels: [] };
let nextId = 1;

// ═══════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════
document.addEventListener('DOMContentLoaded', function() {
  // Populate prijslijst dropdown
  const lijsten = [...new Set(PRIJSDATA.map(r => r[0]))];
  const sel = document.getElementById('prijslijstSelect');
  lijsten.forEach(l => { const o = document.createElement('option'); o.value = l; o.textContent = l; sel.appendChild(o); });

  // Set date
  document.getElementById('offerteDatum').value = new Date().toISOString().split('T')[0];

  // Load from localStorage
  loadState();
  filterArtikelen();
  renderOfferte();
});

// ═══════════════════════════════════════════════
// ARTIKEL LIJST
// ═══════════════════════════════════════════════
function filterArtikelen() {
  const lijst = document.getElementById('prijslijstSelect').value;
  const zoek = document.getElementById('artikelZoek').value.toLowerCase();
  const filtered = PRIJSDATA.filter(r => r[0] === lijst && (
    r[3].toLowerCase().includes(zoek) || r[2].toLowerCase().includes(zoek)
  ));

  // Group by category
  const cats = {};
  filtered.forEach(r => {
    const cat = r[1] || 'Overig';
    if (!cats[cat]) cats[cat] = [];
    cats[cat].push(r);
  });

  const container = document.getElementById('artikelList');
  container.innerHTML = '';
  let count = 0;

  Object.keys(cats).sort().forEach(cat => {
    const catDiv = document.createElement('div');
    catDiv.className = 'artikel-cat';
    catDiv.textContent = cat;
    container.appendChild(catDiv);

    cats[cat].sort((a,b) => (a[5]*1||0)-(b[5]*1||0)).forEach(r => {
      count++;
      const item = document.createElement('div');
      item.className = 'artikel-item';
      item.onclick = () => addArtikel(r);
      item.innerHTML = '<span class="naam">' + esc(r[3]) + (r[2] ? ' <span style="color:#aaa;font-size:10px">(' + esc(r[2]) + ')</span>' : '') + '</span>' +
        '<span class="eenheid">' + esc(r[4]) + '</span>' +
        '<span class="prijs">€ ' + fmt(parseFloat(r[5])||0) + '</span>';
      container.appendChild(item);
    });
  });

  document.getElementById('artikelCount').textContent = '(' + count + ')';
}

// ═══════════════════════════════════════════════
// OFFERTE REGELS
// ═══════════════════════════════════════════════
function addArtikel(r) {
  offerte.regels.push({
    id: nextId++,
    code: r[2],
    omschrijving: r[3],
    eenheid: r[4],
    categorie: r[1],
    prijs: parseFloat(r[5]) || 0,
    aantal: 1,
    custom: false
  });
  renderOfferte();
  autoSave();
  showToast('✓ ' + r[3] + ' toegevoegd');
}

function addCustomRow() {
  offerte.regels.push({
    id: nextId++,
    code: '',
    omschrijving: 'Nieuwe regel',
    eenheid: 'Stuk',
    categorie: 'Overig',
    prijs: 0,
    aantal: 1,
    custom: true
  });
  renderOfferte();
  autoSave();
}

function removeRegel(id) {
  offerte.regels = offerte.regels.filter(r => r.id !== id);
  renderOfferte();
  autoSave();
}

function updateRegel(id, field, value) {
  const r = offerte.regels.find(r => r.id === id);
  if (r) {
    if (field === 'aantal' || field === 'prijs') r[field] = parseFloat(value) || 0;
    else r[field] = value;
  }
  renderOfferte();
  autoSave();
}

// ═══════════════════════════════════════════════
// RENDER OFFERTE
// ═══════════════════════════════════════════════
function renderOfferte() {
  const container = document.getElementById('offerteContent');

  if (offerte.regels.length === 0) {
    container.innerHTML = '<div class="empty-state">Nog geen artikelen toegevoegd.<br>Zoek en klik links om artikelen toe te voegen.</div>';
    renderTotalen(0);
    return;
  }

  // Group by category
  const cats = {};
  offerte.regels.forEach(r => {
    const cat = r.categorie || 'Overig';
    if (!cats[cat]) cats[cat] = [];
    cats[cat].push(r);
  });

  let html = '<table class="offerte-table"><thead><tr><th style="width:30px"></th><th>Omschrijving</th><th style="width:60px">Eenheid</th><th class="num" style="width:70px">Aantal</th><th class="num" style="width:90px">Prijs</th><th class="num" style="width:90px">Totaal</th><th style="width:30px"></th></tr></thead><tbody>';

  let subtotaal = 0;
  Object.keys(cats).sort().forEach(cat => {
    html += '<tr class="cat-row"><td colspan="7">' + esc(cat) + '</td></tr>';
    cats[cat].forEach(r => {
      const totaal = r.aantal * r.prijs;
      subtotaal += totaal;
      html += '<tr>' +
        '<td style="color:#aaa;font-size:10px">' + esc(r.code) + '</td>' +
        '<td>' + (r.custom ? '<input value="' + esc(r.omschrijving) + '" oninput="updateRegel(' + r.id + ',\'omschrijving\',this.value)" style="border:1px dashed #ccc;width:100%">' : esc(r.omschrijving)) + '</td>' +
        '<td>' + (r.custom ? '<input value="' + esc(r.eenheid) + '" oninput="updateRegel(' + r.id + ',\'eenheid\',this.value)" style="width:60px;border:1px dashed #ccc">' : esc(r.eenheid)) + '</td>' +
        '<td class="num"><input type="number" value="' + r.aantal + '" min="0" step="1" onchange="updateRegel(' + r.id + ',\'aantal\',this.value)"></td>' +
        '<td class="num"><input type="number" value="' + r.prijs.toFixed(2) + '" min="0" step="0.01" onchange="updateRegel(' + r.id + ',\'prijs\',this.value)"></td>' +
        '<td class="num" style="font-weight:600">€ ' + fmt(totaal) + '</td>' +
        '<td><button class="del-btn" onclick="removeRegel(' + r.id + ')">×</button></td>' +
        '</tr>';
    });
  });

  html += '</tbody></table>';
  container.innerHTML = html;
  renderTotalen(subtotaal);
}

function renderTotalen(subtotaal) {
  const kortingPct = parseFloat(document.getElementById('kortingPct').value) || 0;
  const korting = subtotaal * (kortingPct / 100);
  const naKorting = subtotaal - korting;
  const btw = naKorting * 0.21;
  const totaal = naKorting + btw;

  let html = '<table class="totalen-table">';
  html += '<tr><td class="label">Subtotaal</td><td class="value">€ ' + fmt(subtotaal) + '</td></tr>';
  if (kortingPct > 0) {
    html += '<tr><td class="label">Korting (' + kortingPct + '%)</td><td class="value" style="color:var(--danger)">- € ' + fmt(korting) + '</td></tr>';
    html += '<tr><td class="label">Na korting</td><td class="value">€ ' + fmt(naKorting) + '</td></tr>';
  }
  html += '<tr><td class="label">BTW (21%)</td><td class="value">€ ' + fmt(btw) + '</td></tr>';
  html += '<tr class="grand"><td class="label">Totaal incl. BTW</td><td class="value">€ ' + fmt(totaal) + '</td></tr>';
  html += '</table>';
  document.getElementById('totalenBox').innerHTML = html;
}

  doc.text('Deze offerte is 30 dagen geldig. Alle genoemde bedragen zijn exclusief BTW tenzij anders vermeld.', M, y);
  y += 4;
  doc.text('Op al onze werkzaamheden zijn de Algemene Voorwaarden van Ground Research BV van toepassing.', M, y);
  y += 4;
  doc.text('Ground Research BV  |  IBAN: NL...  |  KvK: 37115498  |  BTW: NL815774866B01', M, y);

  // Save
  const naam = (gv('klantBedrijf') || 'offerte').replace(/\s+/g, '_');
  doc.save('Offerte_' + naam + '_' + gv('offerteDatum') + '.pdf');
  showToast('📄 PDF geëxporteerd');
}

// ═══════════════════════════════════════════════
// SAVE / LOAD
// ═══════════════════════════════════════════════
function autoSave() {
  const state = {
    offerte: offerte,
    nextId: nextId,
    prijslijst: document.getElementById('prijslijstSelect').value,
    klant: { bedrijf: gv('klantBedrijf'), contact: gv('klantContact'), adres: gv('klantAdres'), postcode: gv('klantPostcode'), plaats: gv('klantPlaats') },
    project: { naam: gv('projectNaam'), kenmerk: gv('projectKenmerk'), locatie: gv('projectLocatie') },
    datum: gv('offerteDatum'),
    nummer: gv('offerteNummer'),
    kortingPct: gv('kortingPct'),
    opmerkingen: gv('opmerkingen')
  };
  localStorage.setItem('gr_offerte', JSON.stringify(state));
}

function loadState() {
  try {
    const s = JSON.parse(localStorage.getItem('gr_offerte'));
    if (!s) return;
    offerte = s.offerte || { regels: [] };
    nextId = s.nextId || 1;
    if (s.prijslijst) document.getElementById('prijslijstSelect').value = s.prijslijst;
    if (s.klant) {
      sv('klantBedrijf', s.klant.bedrijf);
      sv('klantContact', s.klant.contact);
      sv('klantAdres', s.klant.adres);
      sv('klantPostcode', s.klant.postcode);
      sv('klantPlaats', s.klant.plaats);
    }
    if (s.project) {
      sv('projectNaam', s.project.naam);
      sv('projectKenmerk', s.project.kenmerk);
      sv('projectLocatie', s.project.locatie);
    }
    if (s.datum) sv('offerteDatum', s.datum);
    if (s.nummer) sv('offerteNummer', s.nummer);
    if (s.kortingPct) sv('kortingPct', s.kortingPct);
    if (s.opmerkingen) sv('opmerkingen', s.opmerkingen);
  } catch(e) {}
}

function exportJSON() {
  autoSave();
  const data = localStorage.getItem('gr_offerte');
  const blob = new Blob([data], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'offerte_' + (gv('offerteNummer') || 'backup') + '.json';
  a.click();
  URL.revokeObjectURL(a.href);
  showToast('💾 JSON geëxporteerd');
}

function importJSON() {
  document.getElementById('importFile').click();
}

function doImport(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    localStorage.setItem('gr_offerte', e.target.result);
    loadState();
    filterArtikelen();
    renderOfferte();
    showToast('📂 Offerte geladen');
  };
  reader.readAsText(file);
  event.target.value = '';
}

function nieuweOfferte() {
  if (!confirm('Nieuwe offerte starten? Huidige wordt gewist.')) return;
  offerte = { regels: [] };
  nextId = 1;
  ['klantBedrijf','klantContact','klantAdres','klantPostcode','klantPlaats','projectNaam','projectKenmerk','projectLocatie','offerteNummer','opmerkingen'].forEach(id => sv(id, ''));
  sv('kortingPct', '0');
  document.getElementById('offerteDatum').value = new Date().toISOString().split('T')[0];
  renderOfferte();
  autoSave();
  showToast('🗑️ Nieuwe offerte gestart');
}

function duplicateOfferte() {
  // Just re-save with new nummer
  const nr = gv('offerteNummer');
  sv('offerteNummer', nr ? nr + '-kopie' : 'KOPIE');
  autoSave();
  showToast('📋 Offerte gedupliceerd');
}

// ═══════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════
function gv(id) { return document.getElementById(id)?.value || ''; }
function sv(id, v) { const el = document.getElementById(id); if (el) el.value = v || ''; }
function esc(s) { const d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML; }
function fmt(n) { return n.toLocaleString('nl-NL', { minimumFractionDigits: 2, maximumFractionDigits: 2 }); }
function formatDateNL(d) {
  if (!d) return '';
  const parts = d.split('-');
  return parts[2] + '-' + parts[1] + '-' + parts[0];
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}
</script>
