<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Offerte Tool — Ground Research BV</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="klanten.js"></script>
<style>
:root { --primary: #1e3a5f; --primary-light: #2a5a8f; --accent: #e8a838; --bg: #f5f7fa; --card: #fff; --border: #dde3ea; --text: #2c3e50; --muted: #7f8c9b; --success: #27ae60; --danger: #e74c3c; }
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text); font-size: 14px; }

/* HEADER */
.header { background: var(--primary); color: #fff; padding: 12px 24px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 8px rgba(0,0,0,.2); }
.header h1 { font-size: 18px; font-weight: 600; }
.header .subtitle { font-size: 12px; opacity: .7; }
.header-actions { display: flex; gap: 8px; flex-wrap: wrap; }

/* LAYOUT */
.container { max-width: 1100px; margin: 0 auto; padding: 20px 16px; }
.section { margin-bottom: 16px; }

/* CARDS */
.card { background: var(--card); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
.card-header { background: var(--primary); color: #fff; padding: 10px 14px; font-weight: 600; font-size: 13px; display: flex; justify-content: space-between; align-items: center; }
.card-body { padding: 14px; }

/* FORMS */
label { display: block; font-size: 11px; font-weight: 600; color: var(--muted); margin-bottom: 2px; text-transform: uppercase; letter-spacing: .5px; }
input, select, textarea { width: 100%; padding: 8px 10px; border: 1px solid var(--border); border-radius: 4px; font-size: 13px; font-family: inherit; }
input:focus, select:focus, textarea:focus { outline: none; border-color: var(--primary-light); box-shadow: 0 0 0 2px rgba(30,58,95,.15); }
.form-group { margin-bottom: 8px; }

/* TOP BAR: Prijslijst + Datum + Nummer */
.top-bar { display: grid; grid-template-columns: 1fr 150px 150px; gap: 12px; align-items: end; }
@media(max-width:700px) { .top-bar { grid-template-columns: 1fr; } }

/* KLANT + PROJECT naast elkaar */
.info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
@media(max-width:700px) { .info-grid { grid-template-columns: 1fr; } }
.info-grid .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }

/* ARTIKELEN ZOEKEN - prominent */
.search-section { position: relative; }
.search-section input { font-size: 15px; padding: 12px 16px 12px 42px; border: 2px solid var(--primary); border-radius: 8px; }
.search-section input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(232,168,56,.2); }
.search-section::before { content: '🔍'; position: absolute; left: 14px; top: 50%; transform: translateY(-50%); font-size: 16px; }
.search-meta { display: flex; justify-content: space-between; align-items: center; margin-top: 8px; font-size: 12px; color: var(--muted); }

/* ARTIKEL GRID */
.artikel-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 6px; max-height: 350px; overflow-y: auto; margin-top: 8px; padding: 4px; border: 1px solid var(--border); border-radius: 6px; background: #fafbfc; }
.artikel-cat-label { grid-column: 1 / -1; background: var(--primary); color: #fff; padding: 5px 10px; border-radius: 4px; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .5px; margin-top: 4px; }
.artikel-card { background: #fff; border: 1px solid var(--border); border-radius: 6px; padding: 8px 10px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; transition: all .12s; }
.artikel-card:hover { border-color: var(--primary); background: #eef3fb; transform: translateY(-1px); box-shadow: 0 2px 6px rgba(0,0,0,.08); }
.artikel-card .naam { font-size: 12px; flex: 1; margin-right: 8px; }
.artikel-card .code { color: var(--muted); font-size: 10px; }
.artikel-card .prijs-tag { background: var(--primary); color: #fff; padding: 2px 8px; border-radius: 12px; font-size: 11px; font-weight: 700; white-space: nowrap; }

/* BUTTONS */
.btn { padding: 7px 14px; border: none; border-radius: 4px; font-size: 12px; font-weight: 600; cursor: pointer; display: inline-flex; align-items: center; gap: 5px; transition: all .15s; }
.btn-primary { background: var(--primary); color: #fff; }
.btn-primary:hover { background: var(--primary-light); }
.btn-success { background: var(--success); color: #fff; }
.btn-success:hover { background: #219a52; }
.btn-danger { background: var(--danger); color: #fff; }
.btn-danger:hover { background: #c0392b; }
.btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text); }
.btn-outline:hover { background: var(--bg); }
.btn-sm { padding: 4px 8px; font-size: 11px; }

/* OFFERTE TABEL */
.offerte-table { width: 100%; border-collapse: collapse; font-size: 12px; }
.offerte-table th { background: var(--primary); color: #fff; padding: 8px 10px; text-align: left; font-size: 11px; text-transform: uppercase; letter-spacing: .5px; }
.offerte-table td { padding: 6px 10px; border-bottom: 1px solid var(--border); vertical-align: middle; }
.offerte-table .num { text-align: right; }
.offerte-table input[type=number] { width: 70px; text-align: right; padding: 4px 6px; }
.offerte-table .del-btn { color: var(--danger); cursor: pointer; font-size: 16px; border: none; background: none; padding: 2px 6px; }
.offerte-table .del-btn:hover { background: #fde; border-radius: 3px; }
.cat-row td { background: var(--bg); font-weight: 700; color: var(--primary); font-size: 11px; text-transform: uppercase; }
.empty-state { text-align: center; padding: 40px; color: var(--muted); }

/* BOTTOM: opmerkingen + totalen */
.bottom-grid { display: grid; grid-template-columns: 1fr 350px; gap: 12px; }
@media(max-width:700px) { .bottom-grid { grid-template-columns: 1fr; } }

/* TOTALEN */
.totalen-table { width: 100%; border-collapse: collapse; font-size: 13px; }
.totalen-table td { padding: 6px 10px; }
.totalen-table .label { text-align: right; color: var(--muted); }
.totalen-table .value { text-align: right; font-weight: 600; }
.totalen-table .grand td { font-size: 16px; font-weight: 800; color: var(--primary); border-top: 2px solid var(--primary); }

/* TOAST */
.toast { position: fixed; bottom: 20px; right: 20px; background: var(--primary); color: #fff; padding: 10px 20px; border-radius: 6px; font-size: 13px; z-index: 999; transform: translateY(80px); opacity: 0; transition: all .3s; }
.toast.show { transform: translateY(0); opacity: 1; }

/* AUTH */
.auth-overlay { position: fixed; inset: 0; background: linear-gradient(135deg, #0d1b2a 0%, #1e3a5f 40%, #4da6ff 100%); display: flex; align-items: center; justify-content: center; z-index: 10000; }
.auth-card { background: #fff; border-radius: 12px; padding: 32px; width: 360px; max-width: 90vw; box-shadow: 0 8px 32px rgba(0,0,0,.3); }
.auth-card h2 { text-align: center; margin-bottom: 20px; color: var(--primary); }
.auth-card .form-group { margin-bottom: 12px; }
.auth-card button { width: 100%; padding: 10px; background: var(--primary); color: #fff; border: none; border-radius: 6px; font-size: 14px; font-weight: 600; cursor: pointer; }
.auth-card button:hover { background: var(--primary-light); }
.auth-card .auth-switch { text-align: center; margin-top: 16px; font-size: 13px; color: var(--muted); }
.auth-card .auth-switch a { color: var(--primary); cursor: pointer; text-decoration: underline; }
.auth-card .auth-error { color: var(--danger); font-size: 12px; margin-top: 8px; text-align: center; }

/* OFFERTE SELECTOR */
.offerte-bar { background: #f0f4f8; border-bottom: 1px solid var(--border); padding: 8px 16px; display: flex; align-items: center; gap: 10px; font-size: 13px; }
.offerte-bar select { padding: 5px 8px; border: 1px solid var(--border); border-radius: 4px; font-size: 13px; min-width: 200px; }
.offerte-bar .btn-sm { padding: 4px 10px; font-size: 12px; border-radius: 4px; cursor: pointer; border: 1px solid var(--border); background: #fff; }
.offerte-bar .btn-sm:hover { background: #e8ecf0; }
.save-status { margin-left: auto; font-size: 11px; color: var(--muted); }
</style>
</head>
<body>

<!-- ══════ AUTH OVERLAY ══════ -->
<div class="auth-overlay" id="authOverlay">
  <div class="auth-card">
    <h2>⛏️ Offerte Tool</h2>
    <div id="authForm">
      <div class="form-group"><label>Email</label><input type="email" id="authEmail" placeholder="je@email.com"></div>
      <div class="form-group"><label>Wachtwoord</label><input type="password" id="authPassword" placeholder="••••••••" minlength="6"></div>
      <button onclick="doLogin()" id="authBtn">Inloggen</button>
      <div class="auth-switch">Nog geen account? <a onclick="toggleAuth()">Registreren</a></div>
      <div class="auth-error" id="authError"></div>
    </div>
  </div>
</div>

<!-- ══════ HEADER ══════ -->
<div class="header">
  <div>
    <h1>⛏️ Ground Research BV — Offerte Tool</h1>
    <div class="subtitle">Vrijheidweg 45, 1521 RP Wormerveer</div>
  </div>
  <div class="header-actions">
    <button class="btn btn-success" onclick="exportPDF()">📄 PDF</button>
    <button class="btn btn-outline" style="color:#fff;border-color:rgba(255,255,255,.3)" onclick="exportJSON()">💾 Export</button>
    <button class="btn btn-outline" style="color:#fff;border-color:rgba(255,255,255,.3)" onclick="importJSON()">📂 Import</button>
    <button class="btn btn-outline" style="color:#fff;border-color:rgba(255,255,255,.3)" onclick="duplicateOfferte()">📋 Dupliceer</button>
    <button class="btn btn-danger" onclick="nieuweOfferte()">🗑️ Nieuw</button>
    <button class="btn btn-outline" style="color:#fff;border-color:rgba(255,255,255,.3)" onclick="doLogout()" title="Uitloggen">🚪</button>
  </div>
</div>

<!-- ══════ OFFERTE SELECTOR BAR ══════ -->
<div class="offerte-bar" id="offerteBar">
  <strong>📋 Offerte:</strong>
  <select id="offerteSelect" onchange="switchOfferte()"></select>
  <button class="btn-sm" onclick="nieuweOfferteCloud()">+ Nieuw</button>
  <button class="btn-sm" onclick="renameOfferte()">✏️ Hernoem</button>
  <button class="btn-sm" style="color:var(--danger)" onclick="deleteOfferteCloud()">🗑️ Verwijder</button>
  <span class="save-status" id="saveStatus">✅ Opgeslagen</span>
</div>

<div class="container">

<!-- ══════ 1. PRIJSLIJST + DATUM + NUMMER ══════ -->
<div class="section">
  <div class="top-bar">
    <div class="form-group"><label>Prijslijst</label><select id="prijslijstSelect" onchange="filterArtikelen()"></select></div>
    <div class="form-group"><label>Datum</label><input type="date" id="offerteDatum" oninput="autoSave()"></div>
    <div class="form-group"><label>Offertenummer</label><input id="offerteNummer" placeholder="GR-2026-001" oninput="autoSave()"></div>
  </div>
</div>

<!-- ══════ 2. KLANT + PROJECT ══════ -->
<div class="section">
  <div class="info-grid">
    <div class="card">
      <div class="card-header">Klantgegevens <span style="font-weight:400;font-size:11px;opacity:.7">— selecteer of typ handmatig</span></div>
      <div style="padding:10px 14px 0 14px">
        <div class="form-group" style="margin-bottom:6px">
          <label>Klant selecteren</label>
          <select id="klantSelect" onchange="selectKlant()" style="font-size:13px">
            <option value="">— Kies een klant —</option>
          </select>
        </div>
      </div>
      <div class="card-body">
        <div class="form-group"><label>Bedrijfsnaam</label><input id="klantBedrijf" oninput="autoSave()"></div>
        <div class="form-group"><label>Contactpersoon</label><input id="klantContact" oninput="autoSave()"></div>
        <div class="form-group"><label>Adres</label><input id="klantAdres" oninput="autoSave()"></div>
        <div class="form-row">
          <div class="form-group"><label>Postcode</label><input id="klantPostcode" oninput="autoSave()"></div>
          <div class="form-group"><label>Plaats</label><input id="klantPlaats" oninput="autoSave()"></div>
        </div>
      </div>
    </div>
    <div class="card">
      <div class="card-header">Projectgegevens</div>
      <div class="card-body">
        <div class="form-group"><label>Projectnaam</label><input id="projectNaam" oninput="autoSave()"></div>
        <div class="form-group"><label>Kenmerk / Referentie</label><input id="projectKenmerk" oninput="autoSave()"></div>
        <div class="form-group"><label>Locatie</label><input id="projectLocatie" oninput="autoSave()"></div>
      </div>
    </div>
  </div>
</div>

<!-- ══════ 3. ARTIKELEN ZOEKEN ══════ -->
<div class="section">
  <div class="search-section">
    <input id="artikelZoek" placeholder="Zoek artikel op naam of code... (klik om toe te voegen)" oninput="filterArtikelen()">
  </div>
  <div class="search-meta">
    <span id="artikelCount"></span>
    <button class="btn btn-sm btn-outline" onclick="addCustomRow()">+ Eigen regel toevoegen</button>
  </div>
  <div class="artikel-grid" id="artikelList"></div>
</div>

<!-- ══════ 4. OFFERTE TABEL ══════ -->
<div class="section">
  <div class="card">
    <div class="card-header">
      Offerte
      <span id="regelCount" style="opacity:.6;font-weight:400"></span>
    </div>
    <div class="card-body" style="padding:0">
      <div id="offerteContent"></div>
    </div>
  </div>
</div>

<!-- ══════ 5. OPMERKINGEN + TOTALEN ══════ -->
<div class="section">
  <div class="bottom-grid">
    <div class="card">
      <div class="card-header">Opmerkingen</div>
      <div class="card-body">
        <textarea id="opmerkingen" rows="4" placeholder="Opmerkingen, voorwaarden, bijzonderheden..." oninput="autoSave()"></textarea>
      </div>
    </div>
    <div class="card">
      <div class="card-header">Totalen</div>
      <div class="card-body">
        <div class="form-group">
          <label>Korting %</label>
          <input type="number" id="kortingPct" value="0" min="0" max="100" step="1" oninput="renderOfferte()" style="width:80px">
        </div>
        <div id="totalenBox"></div>
      </div>
    </div>
  </div>
</div>

</div><!-- container -->

<div class="toast" id="toast"></div>
<input type="file" id="importFile" accept=".json" style="display:none" onchange="doImport(event)">

// STATE

let offerte = { regels: [] };
let nextId = 1;

// ═══════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════
document.addEventListener('DOMContentLoaded', function() {
  const lijsten = [...new Set(PRIJSDATA.map(r => r[0]))];
  const sel = document.getElementById('prijslijstSelect');
  lijsten.forEach(l => { const o = document.createElement('option'); o.value = l; o.textContent = l; sel.appendChild(o); });
  document.getElementById('offerteDatum').value = new Date().toISOString().split('T')[0];
  // Klanten dropdown vullen
  if (typeof KLANTEN !== 'undefined') {
    const ks = document.getElementById('klantSelect');
    KLANTEN.forEach((k, i) => { const o = document.createElement('option'); o.value = i; o.textContent = k.naam; ks.appendChild(o); });
  }
  // Auth init — app wordt geladen via showApp() na login
  initAuth();
});

// ═══════════════════════════════════════════════
// ARTIKEL LIJST (card grid)
// ═══════════════════════════════════════════════
function filterArtikelen() {
  const lijst = document.getElementById('prijslijstSelect').value;
  const zoek = document.getElementById('artikelZoek').value.toLowerCase();
  const filtered = PRIJSDATA.filter(r => r[0] === lijst && (
    r[3].toLowerCase().includes(zoek) || r[2].toLowerCase().includes(zoek)
  ));
  const cats = {};
  filtered.forEach(r => { const cat = r[1] || 'Overig'; if (!cats[cat]) cats[cat] = []; cats[cat].push(r); });

  const container = document.getElementById('artikelList');
  container.innerHTML = '';
  let count = 0;

  Object.keys(cats).sort().forEach(cat => {
    const catLabel = document.createElement('div');
    catLabel.className = 'artikel-cat-label';
    catLabel.textContent = cat;
    container.appendChild(catLabel);

    cats[cat].sort((a,b) => a[3].localeCompare(b[3],'nl')).forEach(r => {
      count++;
      const card = document.createElement('div');
      card.className = 'artikel-card';
      card.onclick = () => addArtikel(r);
      card.innerHTML = '<div><div class="naam">' + esc(r[3]) + '</div>' +
        (r[2] ? '<div class="code">' + esc(r[2]) + ' · ' + esc(r[4]) + '</div>' : '<div class="code">' + esc(r[4]) + '</div>') +
        '</div><span class="prijs-tag">€ ' + fmt(parseFloat(r[5])||0) + '</span>';
      container.appendChild(card);
    });
  });
  document.getElementById('artikelCount').textContent = count + ' artikelen in deze lijst';
}

// ═══════════════════════════════════════════════
// OFFERTE REGELS
// ═══════════════════════════════════════════════
function addArtikel(r) {
  offerte.regels.push({ id: nextId++, code: r[2], omschrijving: r[3], eenheid: r[4], categorie: r[1], prijs: parseFloat(r[5]) || 0, aantal: 1, custom: false });
  renderOfferte();
  autoSave();
  showToast('✓ ' + r[3] + ' toegevoegd');
}

function addCustomRow() {
  offerte.regels.push({ id: nextId++, code: '', omschrijving: '', eenheid: 'Stuk', categorie: 'Overig', prijs: 0, aantal: 1, custom: true });
  renderOfferte();
  autoSave();
}

function removeRegel(id) {
  offerte.regels = offerte.regels.filter(r => r.id !== id);
  renderOfferte();
  autoSave();
}

function updateRegel(id, field, value) {
  const r = offerte.regels.find(r => r.id === id);
  if (r) { if (field === 'aantal' || field === 'prijs') r[field] = parseFloat(value) || 0; else r[field] = value; }
  // Only re-render totals, NOT the full table (which kills focus/cursor)
  if (field === 'aantal' || field === 'prijs') {
    // Recalculate and update totals + line total
    let subtotaal = 0;
    offerte.regels.forEach(regel => { subtotaal += regel.aantal * regel.prijs; });
    renderTotalen(subtotaal);
    // Update this row's line total
    const rows = document.querySelectorAll('.offerte-table tbody tr:not(.cat-row)');
    rows.forEach(tr => {
      const delBtn = tr.querySelector('.del-btn');
      if (delBtn && delBtn.getAttribute('onclick') && delBtn.getAttribute('onclick').includes(id)) {
        const totaalCell = tr.querySelectorAll('td.num');
        if (totaalCell.length >= 3) {
          totaalCell[2].innerHTML = '<span style="font-weight:600">€ ' + fmt(r.aantal * r.prijs) + '</span>';
        }
      }
    });
  }
  autoSave();
}

// ═══════════════════════════════════════════════
// RENDER OFFERTE
// ═══════════════════════════════════════════════
function renderOfferte() {
  const container = document.getElementById('offerteContent');
  document.getElementById('regelCount').textContent = offerte.regels.length ? '(' + offerte.regels.length + ' regels)' : '';

  if (offerte.regels.length === 0) {
    container.innerHTML = '<div class="empty-state">Nog geen artikelen toegevoegd.<br>Zoek hierboven en klik om artikelen toe te voegen.</div>';
    renderTotalen(0);
    return;
  }

  const cats = {};
  offerte.regels.forEach(r => { const cat = r.categorie || 'Overig'; if (!cats[cat]) cats[cat] = []; cats[cat].push(r); });

  let html = '<table class="offerte-table"><thead><tr><th style="width:30px"></th><th>Omschrijving</th><th style="width:60px">Eenheid</th><th class="num" style="width:70px">Aantal</th><th class="num" style="width:90px">Prijs</th><th class="num" style="width:90px">Totaal</th><th style="width:30px"></th></tr></thead><tbody>';

  let subtotaal = 0;
  Object.keys(cats).sort().forEach(cat => {
    html += '<tr class="cat-row"><td colspan="7">' + esc(cat) + '</td></tr>';
    cats[cat].forEach(r => {
      const totaal = r.aantal * r.prijs;
      subtotaal += totaal;
      html += '<tr>' +
        '<td style="color:#aaa;font-size:10px">' + esc(r.code) + '</td>' +
        '<td>' + (r.custom ? '<input value="' + esc(r.omschrijving) + '" placeholder="Omschrijving..." oninput="updateRegel(' + r.id + ',\'omschrijving\',this.value)" autocomplete="off" autocorrect="off" spellcheck="false" style="border:1px dashed #ccc;width:100%;font-size:16px;padding:6px 8px">' : esc(r.omschrijving)) + '</td>' +
        '<td>' + (r.custom ? '<input value="' + esc(r.eenheid) + '" oninput="updateRegel(' + r.id + ',\'eenheid\',this.value)" autocomplete="off" style="width:60px;border:1px dashed #ccc;font-size:16px;padding:6px">' : esc(r.eenheid)) + '</td>' +
        '<td class="num"><input type="number" value="' + r.aantal + '" min="0" step="1" onchange="updateRegel(' + r.id + ',\'aantal\',this.value)"></td>' +
        '<td class="num"><input type="number" value="' + r.prijs.toFixed(2) + '" min="0" step="0.01" onchange="updateRegel(' + r.id + ',\'prijs\',this.value)"></td>' +
        '<td class="num" style="font-weight:600">€ ' + fmt(totaal) + '</td>' +
        '<td><button class="del-btn" onclick="removeRegel(' + r.id + ')">×</button></td></tr>';
    });
  });
  html += '</tbody></table>';
  container.innerHTML = html;
  renderTotalen(subtotaal);
}

function renderTotalen(subtotaal) {
  const kortingPct = parseFloat(document.getElementById('kortingPct').value) || 0;
  const korting = subtotaal * (kortingPct / 100);
  const naKorting = subtotaal - korting;
  const btw = naKorting * 0.21;
  const totaal = naKorting + btw;

  let html = '<table class="totalen-table">';
  html += '<tr><td class="label">Subtotaal</td><td class="value">€ ' + fmt(subtotaal) + '</td></tr>';
  if (kortingPct > 0) {
    html += '<tr><td class="label">Korting (' + kortingPct + '%)</td><td class="value" style="color:var(--danger)">- € ' + fmt(korting) + '</td></tr>';
    html += '<tr><td class="label">Na korting</td><td class="value">€ ' + fmt(naKorting) + '</td></tr>';
  }
  html += '<tr><td class="label">BTW (21%)</td><td class="value">€ ' + fmt(btw) + '</td></tr>';
  html += '<tr class="grand"><td class="label">Totaal incl. BTW</td><td class="value">€ ' + fmt(totaal) + '</td></tr>';
  html += '</table>';
  document.getElementById('totalenBox').innerHTML = html;
}

  if (gv('klantContact')) { y += 5; doc.text('t.a.v. ' + gv('klantContact'), M, y); }
  if (gv('klantAdres')) { y += 5; doc.text(gv('klantAdres'), M, y); }
  if (gv('klantPostcode') || gv('klantPlaats')) { y += 5; doc.text((gv('klantPostcode') + ' ' + gv('klantPlaats')).trim(), M, y); }

  let py = 48;
  doc.setFontSize(9);
  doc.setFont('helvetica', 'bold');
  if (gv('projectNaam')) { doc.text('Project: ', 120, py); doc.setFont('helvetica', 'normal'); doc.text(gv('projectNaam'), 140, py); py += 5; }
  doc.setFont('helvetica', 'bold');
  if (gv('projectKenmerk')) { doc.text('Kenmerk: ', 120, py); doc.setFont('helvetica', 'normal'); doc.text(gv('projectKenmerk'), 140, py); py += 5; }
  doc.setFont('helvetica', 'bold');
  if (gv('projectLocatie')) { doc.text('Locatie: ', 120, py); doc.setFont('helvetica', 'normal'); doc.text(gv('projectLocatie'), 140, py); py += 5; }
  doc.setFont('helvetica', 'bold');
  doc.text('Prijslijst: ', 120, py); doc.setFont('helvetica', 'normal'); doc.text(document.getElementById('prijslijstSelect').value, 140, py);

  y = Math.max(y, py) + 12;

  const cols = [M, M+55, M+100, M+120, M+148, M+CW];
  doc.setFillColor(30, 58, 95);
  doc.rect(M, y, CW, 7, 'F');
  doc.setTextColor(255);
  doc.setFontSize(8);
  doc.setFont('helvetica', 'bold');
  doc.text('Omschrijving', cols[0]+2, y+5);
  doc.text('Eenheid', cols[1]+2, y+5);
  doc.text('Aantal', cols[2]+2, y+5);
  doc.text('Prijs', cols[3]+2, y+5);
  doc.text('Totaal', cols[4]+2, y+5);
  y += 9;

  doc.setTextColor(0);
  doc.setFont('helvetica', 'normal');
  doc.setFontSize(8);

  const cats = {};
  offerte.regels.forEach(r => { const cat = r.categorie || 'Overig'; if (!cats[cat]) cats[cat] = []; cats[cat].push(r); });

  let subtotaal = 0;
  Object.keys(cats).sort().forEach(cat => {
    if (y > 265) { doc.addPage(); y = 20; }
    doc.setFont('helvetica', 'bold');
    doc.setFontSize(8);
    doc.setFillColor(240, 243, 247);
    doc.rect(M, y-3.5, CW, 5, 'F');
    doc.text(cat, cols[0]+2, y);
    y += 6;
    doc.setFont('helvetica', 'normal');

    cats[cat].forEach(r => {
      if (y > 270) { doc.addPage(); y = 20; }
      const totaal = r.aantal * r.prijs;
      subtotaal += totaal;
      const txt = r.omschrijving.length > 45 ? r.omschrijving.substring(0, 43) + '...' : r.omschrijving;
      doc.text(txt, cols[0]+2, y);
      doc.text(r.eenheid || '', cols[1]+2, y);
      doc.text(String(r.aantal), cols[2]+2, y);
      doc.text('€ ' + fmt(r.prijs), cols[3]+2, y);
      doc.text('€ ' + fmt(totaal), cols[4]+2, y);
      doc.setDrawColor(220);
      doc.line(M, y+1.5, M+CW, y+1.5);
      y += 5;
    });
    y += 2;
  });

  y += 5;
  if (y > 250) { doc.addPage(); y = 20; }
  const kortingPct = parseFloat(document.getElementById('kortingPct').value) || 0;
  const korting = subtotaal * (kortingPct / 100);
  const naKorting = subtotaal - korting;
  const btw = naKorting * 0.21;
  const totaal = naKorting + btw;

  doc.setDrawColor(30, 58, 95);
  doc.line(130, y, M+CW, y);
  y += 5;
  doc.setFontSize(9);
  doc.text('Subtotaal:', 132, y); doc.text('€ ' + fmt(subtotaal), M+CW, y, { align: 'right' }); y += 5;
  if (kortingPct > 0) {
    doc.text('Korting (' + kortingPct + '%):', 132, y); doc.text('- € ' + fmt(korting), M+CW, y, { align: 'right' }); y += 5;
  }
  doc.text('BTW (21%):', 132, y); doc.text('€ ' + fmt(btw), M+CW, y, { align: 'right' }); y += 6;
  doc.setFont('helvetica', 'bold');
  doc.setFontSize(11);
  doc.setFillColor(30, 58, 95);
  doc.rect(128, y-4.5, CW-128+M, 8, 'F');
  doc.setTextColor(255);
  doc.text('Totaal incl. BTW:', 132, y+1); doc.text('€ ' + fmt(totaal), M+CW-2, y+1, { align: 'right' });

  const opm = gv('opmerkingen');
  if (opm) {
    y += 15;
    if (y > 255) { doc.addPage(); y = 20; }
    doc.setTextColor(0);
    doc.setFontSize(9);
    doc.setFont('helvetica', 'bold');
    doc.text('Opmerkingen:', M, y);
    doc.setFont('helvetica', 'normal');
    doc.setFontSize(8);
    const lines = doc.splitTextToSize(opm, CW);
    doc.text(lines, M, y + 5);
    y += 5 + lines.length * 4;
  }

  y += 10;
  if (y > 265) { doc.addPage(); y = 20; }
  doc.setTextColor(100);
  doc.setFontSize(7);
  doc.setFont('helvetica', 'italic');
  doc.text('Deze offerte is 30 dagen geldig. Alle genoemde bedragen zijn exclusief BTW tenzij anders vermeld.', M, y);
  y += 4;
  doc.text('Op al onze werkzaamheden zijn de Algemene Voorwaarden van Ground Research BV van toepassing.', M, y);
  y += 4;
  doc.text('Ground Research BV  |  IBAN: NL...  |  KvK: 37115498  |  BTW: NL815774866B01', M, y);

  const naam = (gv('klantBedrijf') || 'offerte').replace(/\s+/g, '_');
  doc.save('Offerte_' + naam + '_' + gv('offerteDatum') + '.pdf');
  showToast('📄 PDF geëxporteerd');
}

// SUPABASE AUTH + CLOUD STORAGE
// ═══════════════════════════════════════════════
const SUPABASE_URL = 'https://varflklvllrnrzhnbbpg.supabase.co';
const SUPABASE_KEY = 'sb_publishable_U1N34WcxGPZSf9qDSHTC2g_2Ah_yR3s';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let currentUser = null;
let currentOfferteId = null;
let allOffertes = [];
let saveTimer = null;
let isRegistering = false;

// Auth
async function initAuth() {
  const { data: { session } } = await sb.auth.getSession();
  if (session) { currentUser = session.user; showApp(); }
  sb.auth.onAuthStateChange((ev, session) => {
    if (session) { currentUser = session.user; showApp(); }
    else { currentUser = null; document.getElementById('authOverlay').style.display = 'flex'; }
  });
}

function toggleAuth() {
  isRegistering = !isRegistering;
  document.getElementById('authBtn').textContent = isRegistering ? 'Account aanmaken' : 'Inloggen';
  document.querySelector('.auth-switch').innerHTML = isRegistering
    ? 'Al een account? <a onclick="toggleAuth()">Inloggen</a>'
    : 'Nog geen account? <a onclick="toggleAuth()">Registreren</a>';
  document.getElementById('authError').textContent = '';
}

async function doLogin() {
  const email = gv('authEmail'), pw = gv('authPassword');
  if (!email || !pw) return;
  document.getElementById('authBtn').disabled = true;
  const { error } = isRegistering
    ? await sb.auth.signUp({ email, password: pw })
    : await sb.auth.signInWithPassword({ email, password: pw });
  document.getElementById('authBtn').disabled = false;
  if (error) document.getElementById('authError').textContent = error.message;
}

async function doLogout() {
  await cloudSave();
  await sb.auth.signOut();
  currentUser = null; currentOfferteId = null; allOffertes = [];
  document.getElementById('authOverlay').style.display = 'flex';
}

async function showApp() {
  document.getElementById('authOverlay').style.display = 'none';
  await loadOffertesList();
  if (allOffertes.length > 0) {
    currentOfferteId = allOffertes[0].id;
    await loadOfferteFromCloud(currentOfferteId);
  } else {
    await nieuweOfferteCloud();
  }
  renderOfferteSelect();
}

// Offerte CRUD
async function loadOffertesList() {
  const { data } = await sb.from('offertes').select('id, name, updated_at').order('updated_at', { ascending: false });
  allOffertes = data || [];
}

function renderOfferteSelect() {
  const sel = document.getElementById('offerteSelect');
  sel.innerHTML = allOffertes.map(o =>
    `<option value="${o.id}" ${o.id === currentOfferteId ? 'selected' : ''}>${o.name}</option>`
  ).join('');
}

async function switchOfferte() {
  await cloudSave();
  currentOfferteId = document.getElementById('offerteSelect').value;
  await loadOfferteFromCloud(currentOfferteId);
}

async function loadOfferteFromCloud(id) {
  const { data, error } = await sb.from('offertes').select('*').eq('id', id).single();
  if (error || !data) return;
  currentOfferteId = data.id;
  const s = data.data || {};
  offerte = s.offerte || { regels: [] };
  nextId = s.nextId || 1;
  if (s.prijslijst) document.getElementById('prijslijstSelect').value = s.prijslijst;
  if (s.klant) { sv('klantBedrijf', s.klant.bedrijf); sv('klantContact', s.klant.contact); sv('klantAdres', s.klant.adres); sv('klantPostcode', s.klant.postcode); sv('klantPlaats', s.klant.plaats); }
  else { ['klantBedrijf','klantContact','klantAdres','klantPostcode','klantPlaats'].forEach(id => sv(id, '')); }
  if (s.project) { sv('projectNaam', s.project.naam); sv('projectKenmerk', s.project.kenmerk); sv('projectLocatie', s.project.locatie); }
  else { ['projectNaam','projectKenmerk','projectLocatie'].forEach(id => sv(id, '')); }
  sv('offerteDatum', s.datum || new Date().toISOString().split('T')[0]);
  sv('offerteNummer', s.nummer || '');
  sv('kortingPct', s.kortingPct || '0');
  sv('opmerkingen', s.opmerkingen || '');
  filterArtikelen();
  renderOfferte();
  setSaveStatus('✅ Geladen');
}

function getOfferteState() {
  return {
    offerte, nextId,
    prijslijst: document.getElementById('prijslijstSelect')?.value,
    klant: { bedrijf: gv('klantBedrijf'), contact: gv('klantContact'), adres: gv('klantAdres'), postcode: gv('klantPostcode'), plaats: gv('klantPlaats') },
    project: { naam: gv('projectNaam'), kenmerk: gv('projectKenmerk'), locatie: gv('projectLocatie') },
    datum: gv('offerteDatum'), nummer: gv('offerteNummer'), kortingPct: gv('kortingPct'), opmerkingen: gv('opmerkingen')
  };
}

async function cloudSave() {
  if (!currentOfferteId || !currentUser) return;
  setSaveStatus('💾 Opslaan...');
  const state = getOfferteState();
  const name = gv('offerteNummer') || gv('klantBedrijf') || 'Nieuwe Offerte';
  const { error } = await sb.from('offertes').update({
    name, data: state, updated_by: currentUser.id
  }).eq('id', currentOfferteId);
  if (error) { setSaveStatus('❌ Fout bij opslaan'); console.error(error); }
  else { setSaveStatus('✅ Opgeslagen'); }
}

function autoSave() {
  // Local cache
  localStorage.setItem('gr_offerte', JSON.stringify(getOfferteState()));
  // Debounced cloud save
  setSaveStatus('✏️ Niet opgeslagen');
  if (saveTimer) clearTimeout(saveTimer);
  saveTimer = setTimeout(() => cloudSave(), 1500);
}

function setSaveStatus(text) {
  const el = document.getElementById('saveStatus');
  if (el) el.textContent = text;
}

async function nieuweOfferteCloud() {
  await cloudSave();
  const { data, error } = await sb.from('offertes').insert({
    name: 'Nieuwe Offerte',
    data: { offerte: { regels: [] }, nextId: 1 },
    created_by: currentUser.id,
    updated_by: currentUser.id
  }).select().single();
  if (error) { showToast('❌ Fout bij aanmaken'); return; }
  await loadOffertesList();
  currentOfferteId = data.id;
  // Reset form
  offerte = { regels: [] }; nextId = 1;
  ['klantBedrijf','klantContact','klantAdres','klantPostcode','klantPlaats','projectNaam','projectKenmerk','projectLocatie','offerteNummer','opmerkingen'].forEach(id => sv(id, ''));
  sv('kortingPct', '0');
  document.getElementById('offerteDatum').value = new Date().toISOString().split('T')[0];
  renderOfferteSelect();
  filterArtikelen();
  renderOfferte();
  showToast('✅ Nieuwe offerte aangemaakt');
}

async function deleteOfferteCloud() {
  if (!currentOfferteId) return;
  if (!confirm('Weet je zeker dat je deze offerte wilt verwijderen?')) return;
  await sb.from('offertes').delete().eq('id', currentOfferteId);
  await loadOffertesList();
  if (allOffertes.length > 0) {
    currentOfferteId = allOffertes[0].id;
    await loadOfferteFromCloud(currentOfferteId);
  } else {
    await nieuweOfferteCloud();
  }
  renderOfferteSelect();
  showToast('🗑️ Offerte verwijderd');
}

async function renameOfferte() {
  const name = prompt('Nieuwe naam voor deze offerte:', document.getElementById('offerteSelect').selectedOptions[0]?.text);
  if (!name) return;
  await sb.from('offertes').update({ name }).eq('id', currentOfferteId);
  await loadOffertesList();
  renderOfferteSelect();
  showToast('✏️ Hernoemd');
}

// Klant selectie
function selectKlant() {
  const idx = document.getElementById('klantSelect').value;
  if (idx === '') return;
  const k = KLANTEN[parseInt(idx)];
  if (!k) return;
  sv('klantBedrijf', k.naam);
  sv('klantContact', k.contact);
  sv('klantAdres', k.adres);
  sv('klantPlaats', k.plaats);
  // Postcode niet in CRM data, leeg laten
  autoSave();
  showToast('👤 ' + k.naam + ' geselecteerd');

// Legacy functions (keep for compatibility)
function loadState() {
  try {
    const s = JSON.parse(localStorage.getItem('gr_offerte'));
    if (!s) return;
    offerte = s.offerte || { regels: [] };
    nextId = s.nextId || 1;
    if (s.prijslijst) document.getElementById('prijslijstSelect').value = s.prijslijst;
    if (s.klant) { sv('klantBedrijf', s.klant.bedrijf); sv('klantContact', s.klant.contact); sv('klantAdres', s.klant.adres); sv('klantPostcode', s.klant.postcode); sv('klantPlaats', s.klant.plaats); }
    if (s.project) { sv('projectNaam', s.project.naam); sv('projectKenmerk', s.project.kenmerk); sv('projectLocatie', s.project.locatie); }
    if (s.datum) sv('offerteDatum', s.datum);
    if (s.nummer) sv('offerteNummer', s.nummer);
    if (s.kortingPct) sv('kortingPct', s.kortingPct);
    if (s.opmerkingen) sv('opmerkingen', s.opmerkingen);
  } catch(e) {}
}

function exportJSON() {
  autoSave();
  const state = JSON.stringify(getOfferteState(), null, 2);
  const blob = new Blob([state], { type: 'application/json' });
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
  a.download = 'offerte_' + (gv('offerteNummer') || 'backup') + '.json'; a.click(); URL.revokeObjectURL(a.href);
  showToast('💾 JSON geëxporteerd');
}

function importJSON() { document.getElementById('importFile').click(); }

function doImport(event) {
  const file = event.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const s = JSON.parse(e.target.result);
      offerte = s.offerte || { regels: [] };
      nextId = s.nextId || 1;
      if (s.klant) { sv('klantBedrijf', s.klant.bedrijf); sv('klantContact', s.klant.contact); sv('klantAdres', s.klant.adres); sv('klantPostcode', s.klant.postcode); sv('klantPlaats', s.klant.plaats); }
      if (s.project) { sv('projectNaam', s.project.naam); sv('projectKenmerk', s.project.kenmerk); sv('projectLocatie', s.project.locatie); }
      if (s.datum) sv('offerteDatum', s.datum);
      if (s.nummer) sv('offerteNummer', s.nummer);
      if (s.kortingPct) sv('kortingPct', s.kortingPct);
      if (s.opmerkingen) sv('opmerkingen', s.opmerkingen);
      filterArtikelen(); renderOfferte(); autoSave();
      showToast('📂 Offerte geladen');
    } catch(err) { showToast('❌ Ongeldig bestand'); }
  };
  reader.readAsText(file); event.target.value = '';
}

function nieuweOfferte() {
  nieuweOfferteCloud();
}

function duplicateOfferte() {
  const state = getOfferteState();
  state.nummer = (state.nummer || '') + '-kopie';
  (async () => {
    const { data } = await sb.from('offertes').insert({
      name: (state.nummer || 'Kopie'),
      data: state,
      created_by: currentUser.id,
      updated_by: currentUser.id
    }).select().single();
    if (data) {
      await loadOffertesList();
      currentOfferteId = data.id;
      sv('offerteNummer', state.nummer);
      renderOfferteSelect();
      showToast('📋 Offerte gedupliceerd');
    }
  })();
}

// ═══════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════
function gv(id) { return document.getElementById(id)?.value || ''; }
function sv(id, v) { const el = document.getElementById(id); if (el) el.value = v || ''; }
function esc(s) { const d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML; }
function fmt(n) { return n.toLocaleString('nl-NL', { minimumFractionDigits: 2, maximumFractionDigits: 2 }); }
function formatDateNL(d) { if (!d) return ''; const p = d.split('-'); return p[2] + '-' + p[1] + '-' + p[0]; }
function showToast(msg) { const t = document.getElementById('toast'); t.textContent = msg; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 2000); }
</script>
